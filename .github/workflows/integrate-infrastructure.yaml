name: Integrate Infrastructure
on:
  pull_request:
    paths:
      - .github/workflows/integrate-infrastructure.yaml
      - "infra/terraform/**"
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check-code-format:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.15.0"
      - name: Check code format
        run: terraform fmt -check -recursive ./infra/terraform
  validation:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.15.0"
      - name: Initialize Terraform working directory
        run: terraform -chdir=./infra/terraform init -backend=false
      - name: Validate configuration files
        run: terraform -chdir=./infra/terraform validate
  plan:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build Lambda functions
        run: GOOS=linux GOARCH=arm64 go build -o ./infra/lambdas/hello/bootstrap -buildvcs=false ./infra/lambdas/hello
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::941594947146:role/harmattan-stg-github-actions
          aws-region: ap-northeast-1
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.15.0"
      - name: Initialize terraform working directory
        run: terraform -chdir=./infra/terraform init -backend-config=stg.tfbackend -reconfigure
      - id: plan
        name: Generates a execution plan
        run: terraform -chdir=./infra/terraform plan -no-color
        continue-on-error: true
        env:
          TF_VAR_env: stg
      - name: Create comment
        uses: actions/github-script@v9
        with:
          script: |
            const stdout = `${{ steps.plan.outputs.stdout }}`;
            const stderr = `${{ steps.plan.outputs.stderr }}`;

            let output = `Terraform Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show plan</summary>

            \`\`\`
            ${stdout}
            \`\`\`
            </details>`;

            if (stderr) {
              output += `
            <details><summary>Show errors</summary>

            \`\`\`
            ${stderr}
            \`\`\`
            </details>
            `;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
